<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="512" height="512" viewBox="0 0 512 512"
     role="img" aria-labelledby="title desc">
  <title id="title">CoreLink icon</title>
  <desc id="desc">A central core connected to three network nodes, enclosed by a C-shaped infrastructure arc.</desc>

  <defs>
    <linearGradient id="corelink-gradient" gradientUnits="userSpaceOnUse" x1="0" y1="44" x2="0" y2="468">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="54%" stop-color="#168BFF"/>
      <stop offset="100%" stop-color="#7B5CFF"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#corelink-gradient)" stroke-linejoin="round">
    <!-- C-shaped infrastructure arc -->
    <path d="M 272 68
             C 142 68, 58 148, 58 256
             C 58 364, 142 444, 272 444"
          stroke-width="28" stroke-linecap="round"/>

    <!-- Inner terminals of the C arc -->
    <path d="M 272 90 V 150" stroke-width="20" stroke-linecap="butt"/>
    <path d="M 272 422 V 362" stroke-width="20" stroke-linecap="butt"/>

    <!-- Short left-side connector bar -->
    <path d="M 58 256 H 150" stroke-width="26" stroke-linecap="butt"/>

    <!-- Central core -->
    <circle cx="242" cy="256" r="55" stroke-width="22"/>

    <!-- Network links -->
    <path d="M 286 224 L 371 168" stroke-width="18" stroke-linecap="butt"/>
    <path d="M 297 256 H 416" stroke-width="18" stroke-linecap="butt"/>
    <path d="M 286 288 L 371 344" stroke-width="18" stroke-linecap="butt"/>

    <!-- Arc endpoint nodes -->
    <circle cx="272" cy="68" r="22" stroke-width="14"/>
    <circle cx="272" cy="444" r="22" stroke-width="14"/>

    <!-- Linked ecosystem nodes -->
    <circle cx="387" cy="158" r="21" stroke-width="14"/>
    <circle cx="436" cy="256" r="21" stroke-width="14"/>
    <circle cx="387" cy="354" r="21" stroke-width="14"/>
  </g>
</svg>
